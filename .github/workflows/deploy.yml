name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: "deploy-docs-to-main"
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: rm -rf docs
      - run: npm run build
      - name: Verify docs artifacts exist
        run: |
          if [ ! -d docs ] || [ -z "$(find docs -type f -print -quit)" ]; then
            echo "Build did not produce docs artifacts."
            exit 1
          fi
      - name: Commit and push docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f -A docs
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
            exit 0
          fi
          git commit -m "chore: update docs for deployment [skip ci]"
          git push origin HEAD:main
